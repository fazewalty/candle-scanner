name: Daily candle scanner

on:
  workflow_dispatch:

  schedule:
    # Runs Monday-Friday at 21:15 UTC.
    # This is after the regular US market close during
    # both daylight-saving and standard time.
    - cron: "15 21 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py

      - name: Save scan results to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add current_scan.csv scan_history.csv

          if git diff --cached --quiet; then
            echo "No result changes."
          else
            git commit -m "Update candle scan results"
            git push
          fi
